name: Build Android APK & AAB

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Create keystore directory
        working-directory: android
        run: mkdir -p keystore

      - name: Decode keystore (release only)
        if: github.ref == 'refs/heads/main'
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore/release.keystore
          else
            keytool -genkey -v \
              -keystore keystore/release.keystore \
              -alias parvane \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass parvane2024 -keypass parvane2024 \
              -dname "CN=Parvane Salon, O=Parvane Akbarpour, L=Tehran, C=IR"
          fi

      - name: Generate debug keystore
        if: github.ref != 'refs/heads/main'
        working-directory: android
        run: |
          keytool -genkey -v \
            -keystore keystore/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        working-directory: android
        env:
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'parvane2024' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'parvane' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'parvane2024' }}
        run: gradle assembleRelease

      - name: Build Release AAB
        if: github.ref == 'refs/heads/main'
        working-directory: android
        env:
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'parvane2024' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'parvane' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'parvane2024' }}
        run: gradle bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Release AAB
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: release-artifacts
        continue-on-error: true

      - name: Get version
        id: version
        run: echo "VERSION=v$(date +'%Y.%m.%d')-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "سالن زیبایی پروانه — ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📱 نسخه جدید سالن زیبایی پروانه

            ### دانلود APK
            فایل APK را از بخش **Assets** دانلود و روی گوشی اندروید نصب کنید.

            ### تغییرات
            ${{ github.event.head_commit.message }}
          files: release-artifacts/*.apk
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
