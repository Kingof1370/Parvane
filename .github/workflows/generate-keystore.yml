name: Generate Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias parvane \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass parvane2024 \
            -keypass parvane2024 \
            -dname "CN=Parvane Salon, OU=Development, O=Parvane Akbarpour, L=Tehran, ST=Tehran, C=IR"

      - name: Show base64 (copy to KEYSTORE_BASE64 secret)
        run: base64 release.keystore
